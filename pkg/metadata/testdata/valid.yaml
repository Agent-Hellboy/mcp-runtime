version: v1
servers:
  - name: test-server
  - name: custom-server
    description: Example server for testing metadata loading.
    image: custom/image
    imageTag: v1
    route: custom-route
    port: 9090
    replicas: 3
    namespace: custom-namespace
    gateway:
      enabled: true
      image: example.com/mcp-proxy:latest
    auth:
      mode: header
    policy:
      mode: allow-list
    session:
      required: true
    tools:
      - name: list_tools
        description: List tools exposed by the server.
        requiredTrust: low
      - name: delete_user
        description: Delete a user from the backing system.
        requiredTrust: high
    analytics:
      enabled: true
      ingestURL: http://analytics.custom-namespace.svc/api/events
      apiKeySecretRef:
        name: analytics-creds
        key: api-key
    secretEnvVars:
      - name: OPENAI_API_KEY
        secretKeyRef:
          name: provider-creds
          key: openai
    rollout:
      strategy: Canary
      canaryReplicas: 1
