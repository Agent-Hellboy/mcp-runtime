misconfigurations:
  - id: KSV-0041
    paths:
      - "k8s/08-runtime-api-rbac.yaml"
    statement: "mcp-runtime-api-team-secrets is bound through namespace-scoped RoleBindings; runtime-api can bind only this ClusterRole for team registry pull secrets."
  - id: KSV-0041
    paths:
      - "config/rbac/role.yaml"
    statement: "The operator reads gateway certificate Secrets and reconciles the per-server mTLS trust-bundle Secret (re-keying the cert-manager CA bundle to the tls.ca key Traefik's TLSOption requires). Secret access is functionally required for auth.mode mtls; the cached controller client also needs list/watch to serve Get."
  - id: KSV-0056
    paths:
      - "k8s/08-runtime-api-rbac.yaml"
    statement: "mcp-runtime-api intentionally provisions team namespace Services and default-deny NetworkPolicies."
  - id: KSV-0056
    paths:
      - "config/rbac/role.yaml"
    statement: "The operator provisions per-MCPServer Ingresses/Traefik routes and the gateway NetworkPolicy that locks the gateway port to the ingress (defense-in-depth for the mtls trusted-header model). NetworkPolicy and Ingress management is core to the operator's reconcile."
  - id: KSV-0014
    paths:
      - "k8s/03-clickhouse.yaml"
      - "k8s/03-clickhouse-hostpath.yaml"
      - "k8s/05-kafka.yaml"
      - "k8s/05-kafka-hostpath.yaml"
    statement: "ClickHouse and Kafka stateful analytics workloads require writable data and log directories on their PVC-backed mounts; readOnlyRootFilesystem is not compatible without image-specific emptyDir wiring."
