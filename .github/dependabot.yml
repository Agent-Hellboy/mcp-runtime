version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      root-go-modules:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /services/platform-api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      services-platform-api-go-modules:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /services/runtime-api
    schedule:
