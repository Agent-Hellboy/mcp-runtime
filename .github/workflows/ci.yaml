name: CI

on:
  pull_request:
    branches: [ "*" ]
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changed-paths:
    name: Detect Docs/Website/Articles Changes
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
      website: ${{ steps.filter.outputs.website }}
      articles: ${{ steps.filter.outputs.articles }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            code:
              - '**'
              - '!articles/**'
              - '!docs/**'
              - '!website/**'
              - '!README.md'
            articles:
              - 'articles/**'
            docs:
              - 'docs/**'
            website:
              - 'website/**'

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install linters
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0

      - name: Run go fmt check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted. Run 'go fmt ./...'"
            gofmt -s -d .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: staticcheck ./...

  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install envtest
        run: |
          export KUBEBUILDER_ASSETS=$(go run sigs.k8s.io/controller-runtime/tools/setup-envtest@v0.24.0 use -p path)
          echo "KUBEBUILDER_ASSETS=$KUBEBUILDER_ASSETS" >> $GITHUB_ENV

      - name: Run unit tests with coverage
        run: |
          module_path="$(go list -m)"
          go test -v -race -coverprofile=unit.out \
            $(go list ./... | grep -v -x "${module_path}/test/integration")

      - name: Test Sentinel service modules
        run: |
          set -euo pipefail

          log_dir="${SENTINEL_SERVICE_TEST_LOG_DIR}"
          mkdir -p "${log_dir}"
          services=(api ingest processor mcp-gateway ui)
          pids=()
          log_files=()
          for service in "${services[@]}"; do
            log_file="${log_dir}/${service}.log"
            echo "[parallel][start] services/${service} (log: ${log_file})"
            (cd "services/${service}" && go test -v -race -count=1 ./...) >"${log_file}" 2>&1 &
            pids+=("$!")
            log_files+=("${log_file}")
          done

          failed=0
          for i in "${!services[@]}"; do
            service="${services[$i]}"
            log_file="${log_files[$i]}"
            if ! wait "${pids[$i]}"; then
              echo "[parallel][fail] services/${service} tests failed; log follows" >&2
              echo "::group::services/${service} failure log"
              cat "${log_file}" || true
              echo "::endgroup::"
              failed=1
            else
              echo "[parallel][pass] services/${service} (log: ${log_file})"
            fi
          done
          exit "${failed}"
        env:
          SENTINEL_SERVICE_TEST_LOG_DIR: ${{ runner.temp }}/sentinel-service-test-logs

      - name: Upload Sentinel service test logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentinel-service-test-logs
          path: ${{ runner.temp }}/sentinel-service-test-logs
          if-no-files-found: ignore

      - name: Run integration tests with coverage
        run: |
          go test -v -race -timeout 30m -coverprofile=integration.out \
            -coverpkg=./internal/...,./pkg/...,./api/... \
            ./test/integration/...
        env:
          KUBEBUILDER_ASSETS: ${{ env.KUBEBUILDER_ASSETS }}

      - name: Merge coverage files
        run: |
          # Remove mode line from integration.out and append to unit.out
          tail -n +2 integration.out >> unit.out
          mv unit.out coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: ./coverage.out
          flags: pre-merge
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  e2e-kind:
    name: Kind E2E
    runs-on: ubuntu-24.04
    # Start after lint only so Kind E2E overlaps unit/integration tests on the runner queue.
    needs: [lint]
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Detect E2E changed files
        id: e2e_changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          list-files: shell
          filters: |
            changed:
              - '**'

      - name: Select Kind E2E scenarios
        run: |
          changed_files=( ${{ steps.e2e_changes.outputs.changed_files }} )
          if [ "${#changed_files[@]}" -gt 0 ]; then
            printf '%s\n' "${changed_files[@]}" > "${RUNNER_TEMP}/e2e-changed-files.txt"
          else
            : > "${RUNNER_TEMP}/e2e-changed-files.txt"
          fi

          scenarios="$(bash test/e2e/select_pr_scenarios.sh < "${RUNNER_TEMP}/e2e-changed-files.txt")"
          echo "E2E_SCENARIOS=${scenarios}" >> "${GITHUB_ENV}"
          echo "Selected Kind E2E scenarios: ${scenarios}"
          echo "Changed files considered for E2E selection:"
          sed 's/^/  /' "${RUNNER_TEMP}/e2e-changed-files.txt"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Free runner disk space
        run: |
          df -h
          sudo rm -rf \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/share/dotnet
          docker system prune -af --volumes || true
          df -h

      - name: Validate E2E scenario selectors
        run: bash test/e2e/scenarios_test.sh

      - name: Install kubectl
        run: |
          curl --retry 5 --retry-delay 5 --retry-all-errors -fsSL -o kubectl "https://dl.k8s.io/release/v1.34.1/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Install kind
        run: |
          curl --retry 5 --retry-delay 5 --retry-all-errors -fsSL -o kind "https://github.com/kubernetes-sigs/kind/releases/download/v0.30.0/kind-linux-amd64"
          chmod +x kind
          sudo mv kind /usr/local/bin/kind

      - name: Install E2E dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 ripgrep

      - name: Show tool versions
        run: |
          docker version
          kubectl version --client
          kind version
          python3 --version
          rg --version

      - name: Configure E2E resource names
        run: |
          suffix="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          port=$((20000 + ((GITHUB_RUN_ID + GITHUB_RUN_ATTEMPT) % 20000)))
          {
            echo "CLUSTER_NAME=mcp-e2e-${suffix}"
            echo "LOCAL_REGISTRY_NAME=mcp-e2e-registry-${suffix}"
            echo "LOCAL_REGISTRY_PORT=${port}"
          } >> "${GITHUB_ENV}"

      - name: Run kind e2e
        env:
          E2E_ARTIFACT_DIR: ${{ github.workspace }}/.e2e-artifacts/kind
          # Mirror stays single-worker to avoid registry push contention on shared runners.
          E2E_IMAGE_MIRROR_PARALLELISM: "1"
          # Local image builds are CPU-bound; two workers matches docs/internals/tests.md guidance.
          E2E_IMAGE_BUILD_PARALLELISM: "2"
          E2E_IMAGE_PREP_PARALLELISM: "2"
          E2E_EXAMPLE_DEPLOY_PARALLELISM: "3"
          E2E_GRANT_RULE_PARALLELISM: "4"
          E2E_HTTP_FLOW_PARALLELISM: "2"
          # One primary MCP server; multitenancy reuses it as tenant-a and adds at most tenant-b.
          E2E_MAX_MCP_SERVERS: "2"
          # PR CI: shorter policy wait budget than local default 90 (still ~90s per stuck wait).
          MCP_POLICY_WAIT_TRIES: "45"
          MCP_HTTP_TIMEOUT: "15"
          RAW_REQUEST_TRIES: "8"
        run: bash test/e2e/kind.sh

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kind-e2e-artifacts
          path: .e2e-artifacts/kind
          if-no-files-found: ignore

  benchmark:
    name: Benchmarks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks
        run: |
          go test -run=^$ -bench=. -benchmem -count=1 ./test/benchmark/...

  generated-drift:
    name: Generated File Drift
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Regenerate CRDs/manifests
        run: make -f Makefile.operator generate manifests

      - name: Regenerate Go package reference
        run: python3 docs/scripts/generate_go_package_reference.py

      - name: Check for drift
        run: |
          if ! git diff --quiet; then
            echo "Generated files are out of date. Run 'make -f Makefile.operator generate manifests' and 'python3 docs/scripts/generate_go_package_reference.py'."
            git diff
            exit 1
          fi

  sbom:
    name: SBOM
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate repository SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: mcp-runtime-repository.spdx.json

      - name: Upload repository SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcp-runtime-repository-sbom
          path: mcp-runtime-repository.spdx.json
          if-no-files-found: error

  deploy-docs:
    name: Deploy Docs (docs.mcpruntime.org)
    runs-on: ubuntu-24.04
    concurrency:
      group: deploy-docs-${{ github.ref }}
      cancel-in-progress: true
    needs: [changed-paths]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changed-paths.outputs.docs == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate docs deploy secrets
        env:
          DOCS_DEPLOY_HOST: ${{ secrets.DOCS_DEPLOY_HOST }}
          DOCS_DEPLOY_USER: ${{ secrets.DOCS_DEPLOY_USER }}
          DOCS_DEPLOY_PATH: ${{ secrets.DOCS_DEPLOY_PATH }}
          DOCS_DEPLOY_SSH_KEY: ${{ secrets.DOCS_DEPLOY_SSH_KEY }}
          DOCS_DEPLOY_HOST_KEY: ${{ secrets.DOCS_DEPLOY_HOST_KEY }}
        run: |
          test -n "$DOCS_DEPLOY_HOST"
          test -n "$DOCS_DEPLOY_USER"
          test -n "$DOCS_DEPLOY_PATH"
          test -n "$DOCS_DEPLOY_SSH_KEY"

      - name: Set up SSH key
        env:
          DOCS_DEPLOY_HOST: ${{ secrets.DOCS_DEPLOY_HOST }}
          DOCS_DEPLOY_SSH_KEY: ${{ secrets.DOCS_DEPLOY_SSH_KEY }}
          DOCS_DEPLOY_HOST_KEY: ${{ secrets.DOCS_DEPLOY_HOST_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf "%s\n" "$DOCS_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          docs_host="${DOCS_DEPLOY_HOST//$'\r'/}"
          docs_host="${docs_host#"${docs_host%%[![:space:]]*}"}"
          docs_host="${docs_host%"${docs_host##*[![:space:]]}"}"
          printf "DOCS_DEPLOY_HOST_CLEAN=%s\n" "$docs_host" >> "$GITHUB_ENV"
          docs_known_hosts="$(mktemp)"
          docs_known_host="${DOCS_DEPLOY_HOST_KEY//$'\r'/}"
          if [ -n "$docs_known_host" ]; then
            case "$docs_known_host" in
              ssh-*|ecdsa-*) printf "%s %s\n" "$docs_host" "$docs_known_host" > "$docs_known_hosts" ;;
              *" ssh-"*|*" ecdsa-"*) printf "%s\n" "$docs_known_host" > "$docs_known_hosts" ;;
              *) echo "::warning::Ignoring DOCS_DEPLOY_HOST_KEY because it is not a known_hosts entry or bare SSH host key." ;;
            esac
          fi
          if ! ssh-keygen -F "$docs_host" -f "$docs_known_hosts" >/dev/null 2>&1; then
            ssh-keyscan -T 10 -t ed25519,rsa "$docs_host" > "$docs_known_hosts"
          fi
          mv "$docs_known_hosts" ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          if ! ssh-keygen -F "$docs_host" -f ~/.ssh/known_hosts >/dev/null; then
            echo "::error::Could not create a known_hosts entry for DOCS_DEPLOY_HOST."
            exit 1
          fi

      - name: Verify docs SSH access
        run: |
          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "${{ secrets.DOCS_DEPLOY_USER }}@$DOCS_DEPLOY_HOST_CLEAN" \
            "true"

      - name: Sync docs/
        run: |
          rsync -az --delete \
            -e "ssh -i $HOME/.ssh/id_ed25519 -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            docs/ \
            "${{ secrets.DOCS_DEPLOY_USER }}@$DOCS_DEPLOY_HOST_CLEAN:${{ secrets.DOCS_DEPLOY_PATH }}/"

      - name: Deploy docs container on remote host
        env:
          DOCS_DEPLOY_COMMAND: ${{ secrets.DOCS_DEPLOY_COMMAND }}
          DOCS_DEPLOY_PATH: ${{ secrets.DOCS_DEPLOY_PATH }}
          DOCS_CONTAINER_NAME: ${{ secrets.DOCS_CONTAINER_NAME }}
          DOCS_IMAGE_NAME: ${{ secrets.DOCS_IMAGE_NAME }}
          DOCS_HOST_PORT: ${{ secrets.DOCS_HOST_PORT }}
          DOCS_CONTAINER_PORT: ${{ secrets.DOCS_CONTAINER_PORT }}
        run: |
          if [ -n "$DOCS_DEPLOY_COMMAND" ]; then
            ssh "${{ secrets.DOCS_DEPLOY_USER }}@$DOCS_DEPLOY_HOST_CLEAN" "$DOCS_DEPLOY_COMMAND"
            exit 0
          fi

          container_name="${DOCS_CONTAINER_NAME:-mcp-runtime-docs}"
          image_name="${DOCS_IMAGE_NAME:-mcp-runtime-docs:latest}"
          host_port="${DOCS_HOST_PORT:-8081}"
          container_port="${DOCS_CONTAINER_PORT:-80}"

          b64() { printf '%s' "$1" | base64 -w 0; }
          # shellcheck disable=SC2029
          ssh "${{ secrets.DOCS_DEPLOY_USER }}@$DOCS_DEPLOY_HOST_CLEAN" \
            "DOCS_DEPLOY_PATH_B64=$(b64 "$DOCS_DEPLOY_PATH") \
             DOCS_CONTAINER_NAME_B64=$(b64 "$container_name") \
             DOCS_IMAGE_NAME_B64=$(b64 "$image_name") \
             DOCS_HOST_PORT_B64=$(b64 "$host_port") \
             DOCS_CONTAINER_PORT_B64=$(b64 "$container_port") \
             bash -s" <<'REMOTE'
          set -euo pipefail
          decode() { printf '%s' "$1" | base64 -d; }
          deploy_path="$(decode "$DOCS_DEPLOY_PATH_B64")"
          container_name="$(decode "$DOCS_CONTAINER_NAME_B64")"
          image_name="$(decode "$DOCS_IMAGE_NAME_B64")"
          host_port="$(decode "$DOCS_HOST_PORT_B64")"
          container_port="$(decode "$DOCS_CONTAINER_PORT_B64")"

          cd "$deploy_path"
          docker rm -f "$container_name" >/dev/null 2>&1 || true
          
          # Retry logic for docker build
          for attempt in {1..3}; do
            echo "Docker build attempt $attempt/3..."
            if docker build --pull -t "$image_name" .; then
              echo "Docker build succeeded"
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Docker build failed. Retrying in 10 seconds..."
              sleep 10
            else
              echo "Docker build failed after 3 attempts"
              exit 1
            fi
          done
          
          docker run -d --name "$container_name" \
            --restart unless-stopped \
            -p "$host_port:$container_port" \
            "$image_name"
          docker image prune -f >/dev/null
          REMOTE

  deploy-website:
    name: Deploy Website (mcpruntime.org)
    runs-on: ubuntu-24.04
    concurrency:
      group: deploy-website-${{ github.ref }}
      cancel-in-progress: true
    needs: [changed-paths]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changed-paths.outputs.website == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate website deploy secrets
        env:
          WEBSITE_DEPLOY_HOST: ${{ secrets.WEBSITE_DEPLOY_HOST }}
          WEBSITE_DEPLOY_USER: ${{ secrets.WEBSITE_DEPLOY_USER }}
          WEBSITE_DEPLOY_PATH: ${{ secrets.WEBSITE_DEPLOY_PATH }}
          WEBSITE_DEPLOY_SSH_KEY: ${{ secrets.WEBSITE_DEPLOY_SSH_KEY }}
          WEBSITE_DEPLOY_HOST_KEY: ${{ secrets.WEBSITE_DEPLOY_HOST_KEY }}
          WEBSITE_BASE_URL: ${{ secrets.WEBSITE_BASE_URL }}
        run: |
          test -n "$WEBSITE_DEPLOY_HOST"
          test -n "$WEBSITE_DEPLOY_USER"
          test -n "$WEBSITE_DEPLOY_PATH"
          test -n "$WEBSITE_DEPLOY_SSH_KEY"

      - name: Set up SSH key
        env:
          WEBSITE_DEPLOY_HOST: ${{ secrets.WEBSITE_DEPLOY_HOST }}
          WEBSITE_DEPLOY_SSH_KEY: ${{ secrets.WEBSITE_DEPLOY_SSH_KEY }}
          WEBSITE_DEPLOY_HOST_KEY: ${{ secrets.WEBSITE_DEPLOY_HOST_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf "%s\n" "$WEBSITE_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          website_host="${WEBSITE_DEPLOY_HOST//$'\r'/}"
          website_host="${website_host#"${website_host%%[![:space:]]*}"}"
          website_host="${website_host%"${website_host##*[![:space:]]}"}"
          printf "WEBSITE_DEPLOY_HOST_CLEAN=%s\n" "$website_host" >> "$GITHUB_ENV"
          website_known_hosts="$(mktemp)"
          website_known_host="${WEBSITE_DEPLOY_HOST_KEY//$'\r'/}"
          if [ -n "$website_known_host" ]; then
            case "$website_known_host" in
              ssh-*|ecdsa-*) printf "%s %s\n" "$website_host" "$website_known_host" > "$website_known_hosts" ;;
              *" ssh-"*|*" ecdsa-"*) printf "%s\n" "$website_known_host" > "$website_known_hosts" ;;
              *) echo "::warning::Ignoring WEBSITE_DEPLOY_HOST_KEY because it is not a known_hosts entry or bare SSH host key." ;;
            esac
          fi
          if ! ssh-keygen -F "$website_host" -f "$website_known_hosts" >/dev/null 2>&1; then
            ssh-keyscan -T 10 -t ed25519,rsa "$website_host" > "$website_known_hosts"
          fi
          mv "$website_known_hosts" ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          if ! ssh-keygen -F "$website_host" -f ~/.ssh/known_hosts >/dev/null; then
            echo "::error::Could not create a known_hosts entry for WEBSITE_DEPLOY_HOST."
            exit 1
          fi

      - name: Verify website SSH access
        run: |
          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "${{ secrets.WEBSITE_DEPLOY_USER }}@$WEBSITE_DEPLOY_HOST_CLEAN" \
            "true"

      - name: Sync website/
        run: |
          rsync -az --delete \
            -e "ssh -i $HOME/.ssh/id_ed25519 -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            website/ \
            "${{ secrets.WEBSITE_DEPLOY_USER }}@$WEBSITE_DEPLOY_HOST_CLEAN:${{ secrets.WEBSITE_DEPLOY_PATH }}/"

      - name: Deploy website container on remote host
        env:
          WEBSITE_DEPLOY_COMMAND: ${{ secrets.WEBSITE_DEPLOY_COMMAND }}
          WEBSITE_DEPLOY_PATH: ${{ secrets.WEBSITE_DEPLOY_PATH }}
          WEBSITE_DOCS_URL: ${{ secrets.WEBSITE_DOCS_URL }}
          WEBSITE_ARTICLES_URL: ${{ secrets.WEBSITE_ARTICLES_URL }}
          WEBSITE_BASE_URL: ${{ secrets.WEBSITE_BASE_URL }}
          WEBSITE_CONTAINER_NAME: ${{ secrets.WEBSITE_CONTAINER_NAME }}
          WEBSITE_IMAGE_NAME: ${{ secrets.WEBSITE_IMAGE_NAME }}
          WEBSITE_HOST_PORT: ${{ secrets.WEBSITE_HOST_PORT }}
          WEBSITE_CONTAINER_PORT: ${{ secrets.WEBSITE_CONTAINER_PORT }}
        run: |
          if [ -n "$WEBSITE_DEPLOY_COMMAND" ]; then
            ssh "${{ secrets.WEBSITE_DEPLOY_USER }}@$WEBSITE_DEPLOY_HOST_CLEAN" "$WEBSITE_DEPLOY_COMMAND"
            exit 0
          fi

          container_name="${WEBSITE_CONTAINER_NAME:-mcp-runtime-website}"
          image_name="${WEBSITE_IMAGE_NAME:-mcp-runtime-website:latest}"
          host_port="${WEBSITE_HOST_PORT:-8080}"
          container_port="${WEBSITE_CONTAINER_PORT:-8080}"
          docs_url="${WEBSITE_DOCS_URL:-https://docs.mcpruntime.org/}"
          base_url="${WEBSITE_BASE_URL:-https://mcpruntime.org}"
          articles_url="${WEBSITE_ARTICLES_URL:-https://articles.mcpruntime.org/}"
          git_sha="${GITHUB_SHA:-unknown}"

          b64() { printf '%s' "$1" | base64 -w 0; }
          # shellcheck disable=SC2029
          ssh "${{ secrets.WEBSITE_DEPLOY_USER }}@$WEBSITE_DEPLOY_HOST_CLEAN" \
            "WEBSITE_DEPLOY_PATH_B64=$(b64 "$WEBSITE_DEPLOY_PATH") \
             WEBSITE_CONTAINER_NAME_B64=$(b64 "$container_name") \
             WEBSITE_IMAGE_NAME_B64=$(b64 "$image_name") \
             WEBSITE_HOST_PORT_B64=$(b64 "$host_port") \
             WEBSITE_CONTAINER_PORT_B64=$(b64 "$container_port") \
             WEBSITE_DOCS_URL_B64=$(b64 "$docs_url") \
             WEBSITE_BASE_URL_B64=$(b64 "$base_url") \
             WEBSITE_ARTICLES_URL_B64=$(b64 "$articles_url") \
             WEBSITE_GIT_SHA_B64=$(b64 "$git_sha") \
             bash -s" <<'REMOTE'
          set -euo pipefail
          decode() { printf '%s' "$1" | base64 -d; }
          deploy_path="$(decode "$WEBSITE_DEPLOY_PATH_B64")"
          container_name="$(decode "$WEBSITE_CONTAINER_NAME_B64")"
          image_name="$(decode "$WEBSITE_IMAGE_NAME_B64")"
          host_port="$(decode "$WEBSITE_HOST_PORT_B64")"
          container_port="$(decode "$WEBSITE_CONTAINER_PORT_B64")"
          docs_url="$(decode "$WEBSITE_DOCS_URL_B64")"
          base_url="$(decode "$WEBSITE_BASE_URL_B64")"
          articles_url="$(decode "$WEBSITE_ARTICLES_URL_B64")"
          git_sha="$(decode "$WEBSITE_GIT_SHA_B64")"

          cd "$deploy_path"
          docker rm -f "$container_name" >/dev/null 2>&1 || true
          
          # Retry logic for docker build
          for attempt in {1..3}; do
            echo "Docker build attempt $attempt/3..."
            if docker build --pull --build-arg GIT_SHA="$git_sha" -t "$image_name" .; then
              echo "Docker build succeeded"
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Docker build failed. Retrying in 10 seconds..."
              sleep 10
            else
              echo "Docker build failed after 3 attempts"
              exit 1
            fi
          done
          
          docker run -d --name "$container_name" \
            --restart unless-stopped \
            -p "$host_port:$container_port" \
            -e MCP_DOCS_URL="$docs_url" \
            -e MCP_WEBSITE_BASE_URL="$base_url" \
            -e MCP_ARTICLES_URL="$articles_url" \
            "$image_name"
          docker image prune -f >/dev/null
          REMOTE

  deploy-articles:
    name: Deploy Articles (articles.mcpruntime.org)
    runs-on: ubuntu-24.04
    concurrency:
      group: deploy-articles-${{ github.ref }}
      cancel-in-progress: true
    needs: [changed-paths]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changed-paths.outputs.articles == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate articles deploy secrets
        env:
          ARTICLES_DEPLOY_HOST: ${{ secrets.ARTICLES_DEPLOY_HOST || secrets.WEBSITE_DEPLOY_HOST }}
          ARTICLES_DEPLOY_USER: ${{ secrets.ARTICLES_DEPLOY_USER || secrets.WEBSITE_DEPLOY_USER }}
          ARTICLES_DEPLOY_PATH: ${{ secrets.ARTICLES_DEPLOY_PATH || secrets.WEBSITE_DEPLOY_PATH }}
          ARTICLES_DEPLOY_SSH_KEY: ${{ secrets.ARTICLES_DEPLOY_SSH_KEY || secrets.WEBSITE_DEPLOY_SSH_KEY }}
          ARTICLES_DEPLOY_HOST_KEY: ${{ secrets.ARTICLES_DEPLOY_HOST_KEY || secrets.WEBSITE_DEPLOY_HOST_KEY }}
          ARTICLES_SECRET_KEY: ${{ secrets.ARTICLES_SECRET_KEY }}
          MCP_ARTICLES_GOOGLE_CLIENT_ID: ${{ secrets.MCP_ARTICLES_GOOGLE_CLIENT_ID || secrets.ARTICLES_GOOGLE_CLIENT_ID || secrets.MCP_GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}
        run: |
          test -n "$ARTICLES_DEPLOY_HOST"
          test -n "$ARTICLES_DEPLOY_USER"
          test -n "$ARTICLES_DEPLOY_PATH"
          test -n "$ARTICLES_DEPLOY_SSH_KEY"
          test -n "$ARTICLES_SECRET_KEY"
          test -n "$MCP_ARTICLES_GOOGLE_CLIENT_ID"

      - name: Set up SSH key
        env:
          ARTICLES_DEPLOY_HOST: ${{ secrets.ARTICLES_DEPLOY_HOST || secrets.WEBSITE_DEPLOY_HOST }}
          ARTICLES_DEPLOY_SSH_KEY: ${{ secrets.ARTICLES_DEPLOY_SSH_KEY || secrets.WEBSITE_DEPLOY_SSH_KEY }}
          ARTICLES_DEPLOY_HOST_KEY: ${{ secrets.ARTICLES_DEPLOY_HOST_KEY || secrets.WEBSITE_DEPLOY_HOST_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf "%s\n" "$ARTICLES_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          articles_host="${ARTICLES_DEPLOY_HOST//$'\r'/}"
          articles_host="${articles_host#"${articles_host%%[![:space:]]*}"}"
          articles_host="${articles_host%"${articles_host##*[![:space:]]}"}"
          printf "ARTICLES_DEPLOY_HOST_CLEAN=%s\n" "$articles_host" >> "$GITHUB_ENV"
          articles_known_hosts="$(mktemp)"
          articles_known_host="${ARTICLES_DEPLOY_HOST_KEY//$'\r'/}"
          if [ -n "$articles_known_host" ]; then
            case "$articles_known_host" in
              ssh-*|ecdsa-*) printf "%s %s\n" "$articles_host" "$articles_known_host" > "$articles_known_hosts" ;;
              *" ssh-"*|*" ecdsa-"*) printf "%s\n" "$articles_known_host" > "$articles_known_hosts" ;;
              *) echo "::warning::Ignoring ARTICLES_DEPLOY_HOST_KEY because it is not a known_hosts entry or bare SSH host key." ;;
            esac
          fi
          if ! ssh-keygen -F "$articles_host" -f "$articles_known_hosts" >/dev/null 2>&1; then
            ssh-keyscan -T 10 -t ed25519,rsa "$articles_host" > "$articles_known_hosts"
          fi
          mv "$articles_known_hosts" ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          if ! ssh-keygen -F "$articles_host" -f ~/.ssh/known_hosts >/dev/null; then
            echo "::error::Could not create a known_hosts entry for ARTICLES_DEPLOY_HOST."
            exit 1
          fi

      - name: Verify articles SSH access
        env:
          ARTICLES_DEPLOY_USER: ${{ secrets.ARTICLES_DEPLOY_USER || secrets.WEBSITE_DEPLOY_USER }}
        run: |
          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "$ARTICLES_DEPLOY_USER@$ARTICLES_DEPLOY_HOST_CLEAN" \
            "true"

      - name: Sync articles/
        env:
          ARTICLES_DEPLOY_USER: ${{ secrets.ARTICLES_DEPLOY_USER || secrets.WEBSITE_DEPLOY_USER }}
          ARTICLES_DEPLOY_PATH: ${{ secrets.ARTICLES_DEPLOY_PATH || secrets.WEBSITE_DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -i $HOME/.ssh/id_ed25519 -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            articles/ \
            "$ARTICLES_DEPLOY_USER@$ARTICLES_DEPLOY_HOST_CLEAN:$ARTICLES_DEPLOY_PATH/"

      - name: Deploy articles container on remote host
        env:
          ARTICLES_DEPLOY_COMMAND: ${{ secrets.ARTICLES_DEPLOY_COMMAND }}
          ARTICLES_DEPLOY_USER: ${{ secrets.ARTICLES_DEPLOY_USER || secrets.WEBSITE_DEPLOY_USER }}
          ARTICLES_DEPLOY_PATH: ${{ secrets.ARTICLES_DEPLOY_PATH || secrets.WEBSITE_DEPLOY_PATH }}
          ARTICLES_DOCS_URL: ${{ secrets.ARTICLES_DOCS_URL }}
          ARTICLES_WEBSITE_URL: ${{ secrets.ARTICLES_WEBSITE_URL }}
          ARTICLES_BASE_URL: ${{ secrets.ARTICLES_BASE_URL }}
          ARTICLES_SECRET_KEY: ${{ secrets.ARTICLES_SECRET_KEY }}
          MCP_ARTICLES_GOOGLE_CLIENT_ID: ${{ secrets.MCP_ARTICLES_GOOGLE_CLIENT_ID || secrets.ARTICLES_GOOGLE_CLIENT_ID || secrets.MCP_GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}
          MCP_ARTICLES_NEWSLETTER_EXPORT_TOKEN: ${{ secrets.MCP_ARTICLES_NEWSLETTER_EXPORT_TOKEN || secrets.ARTICLES_NEWSLETTER_EXPORT_TOKEN }}
          ARTICLES_DB_PATH: ${{ secrets.ARTICLES_DB_PATH }}
          ARTICLES_DATA_VOLUME: ${{ secrets.ARTICLES_DATA_VOLUME }}
          ARTICLES_CONTAINER_NAME: ${{ secrets.ARTICLES_CONTAINER_NAME }}
          ARTICLES_IMAGE_NAME: ${{ secrets.ARTICLES_IMAGE_NAME }}
          ARTICLES_HOST_PORT: ${{ secrets.ARTICLES_HOST_PORT }}
          ARTICLES_CONTAINER_PORT: ${{ secrets.ARTICLES_CONTAINER_PORT }}
        run: |
          if [ -n "$ARTICLES_DEPLOY_COMMAND" ]; then
            ssh "$ARTICLES_DEPLOY_USER@$ARTICLES_DEPLOY_HOST_CLEAN" "$ARTICLES_DEPLOY_COMMAND"
            exit 0
          fi

          container_name="${ARTICLES_CONTAINER_NAME:-mcp-runtime-articles}"
          image_name="${ARTICLES_IMAGE_NAME:-mcp-runtime-articles:latest}"
          host_port="${ARTICLES_HOST_PORT:-8082}"
          container_port="${ARTICLES_CONTAINER_PORT:-8080}"
          docs_url="${ARTICLES_DOCS_URL:-https://docs.mcpruntime.org/}"
          website_url="${ARTICLES_WEBSITE_URL:-https://mcpruntime.org/}"
          base_url="${ARTICLES_BASE_URL:-https://articles.mcpruntime.org}"
          secret_key="${ARTICLES_SECRET_KEY:-}"
          google_client_id="${MCP_ARTICLES_GOOGLE_CLIENT_ID:-}"
          newsletter_export_token="${MCP_ARTICLES_NEWSLETTER_EXPORT_TOKEN:-}"
          db_path="${ARTICLES_DB_PATH:-/data/articles.db}"
          data_volume="${ARTICLES_DATA_VOLUME:-mcp-runtime-articles-data}"
          git_sha="${GITHUB_SHA:-unknown}"

          b64() { printf '%s' "$1" | base64 -w 0; }
          {
            printf 'ARTICLES_DEPLOY_PATH_B64=%q\n' "$(b64 "$ARTICLES_DEPLOY_PATH")"
            printf 'ARTICLES_CONTAINER_NAME_B64=%q\n' "$(b64 "$container_name")"
            printf 'ARTICLES_IMAGE_NAME_B64=%q\n' "$(b64 "$image_name")"
            printf 'ARTICLES_HOST_PORT_B64=%q\n' "$(b64 "$host_port")"
            printf 'ARTICLES_CONTAINER_PORT_B64=%q\n' "$(b64 "$container_port")"
            printf 'ARTICLES_DOCS_URL_B64=%q\n' "$(b64 "$docs_url")"
            printf 'ARTICLES_WEBSITE_URL_B64=%q\n' "$(b64 "$website_url")"
            printf 'ARTICLES_BASE_URL_B64=%q\n' "$(b64 "$base_url")"
            printf 'ARTICLES_SECRET_KEY_B64=%q\n' "$(b64 "$secret_key")"
            printf 'ARTICLES_GOOGLE_CLIENT_ID_B64=%q\n' "$(b64 "$google_client_id")"
            printf 'ARTICLES_NEWSLETTER_EXPORT_TOKEN_B64=%q\n' "$(b64 "$newsletter_export_token")"
            printf 'ARTICLES_DB_PATH_B64=%q\n' "$(b64 "$db_path")"
            printf 'ARTICLES_DATA_VOLUME_B64=%q\n' "$(b64 "$data_volume")"
            printf 'ARTICLES_GIT_SHA_B64=%q\n' "$(b64 "$git_sha")"
            cat <<'REMOTE'
          set -euo pipefail
          decode() { printf '%s' "$1" | base64 -d; }

          deploy_path="$(decode "$ARTICLES_DEPLOY_PATH_B64")"
          container_name="$(decode "$ARTICLES_CONTAINER_NAME_B64")"
          image_name="$(decode "$ARTICLES_IMAGE_NAME_B64")"
          host_port="$(decode "$ARTICLES_HOST_PORT_B64")"
          container_port="$(decode "$ARTICLES_CONTAINER_PORT_B64")"
          docs_url="$(decode "$ARTICLES_DOCS_URL_B64")"
          website_url="$(decode "$ARTICLES_WEBSITE_URL_B64")"
          base_url="$(decode "$ARTICLES_BASE_URL_B64")"
          secret_key="$(decode "$ARTICLES_SECRET_KEY_B64")"
          google_client_id="$(decode "$ARTICLES_GOOGLE_CLIENT_ID_B64")"
          newsletter_export_token="$(decode "$ARTICLES_NEWSLETTER_EXPORT_TOKEN_B64")"
          db_path="$(decode "$ARTICLES_DB_PATH_B64")"
          data_volume="$(decode "$ARTICLES_DATA_VOLUME_B64")"
          git_sha="$(decode "$ARTICLES_GIT_SHA_B64")"

          cd "$deploy_path"
          docker rm -f "$container_name" >/dev/null 2>&1 || true

          for attempt in {1..3}; do
            echo "Docker build attempt $attempt/3..."
            if docker build --pull --build-arg GIT_SHA="$git_sha" -t "$image_name" .; then
              echo "Docker build succeeded"
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Docker build failed. Retrying in 10 seconds..."
              sleep 10
            else
              echo "Docker build failed after 3 attempts"
              exit 1
            fi
          done

          docker run -d --name "$container_name" \
            --restart unless-stopped \
            -p "$host_port:$container_port" \
            -v "$data_volume:/data" \
            -e MCP_DOCS_URL="$docs_url" \
            -e MCP_WEBSITE_URL="$website_url" \
            -e MCP_ARTICLES_BASE_URL="$base_url" \
            -e MCP_ARTICLES_SECRET_KEY="$secret_key" \
            -e MCP_ARTICLES_GOOGLE_CLIENT_ID="$google_client_id" \
            -e MCP_ARTICLES_NEWSLETTER_EXPORT_TOKEN="$newsletter_export_token" \
            -e MCP_ARTICLES_DB_PATH="$db_path" \
            "$image_name"
          docker image prune -f >/dev/null
          REMOTE
          } | ssh "$ARTICLES_DEPLOY_USER@$ARTICLES_DEPLOY_HOST_CLEAN" bash -s
