name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  BINARY_NAME: mcp-runtime

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set release metadata
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="dev"
          fi
          {
            echo "VERSION=${version}"
            echo "COMMIT=${GITHUB_SHA}"
            echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "${GITHUB_ENV}"

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          mkdir -p dist

          if [ "${GOOS}" = "windows" ]; then
            output="dist/${BINARY_NAME}-${GOOS}-${GOARCH}.exe"
          else
            output="dist/${BINARY_NAME}-${GOOS}-${GOARCH}"
          fi

          go build \
            -trimpath \
            -buildvcs=false \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${BUILD_DATE}" \
            -o "${output}" \
            ./cmd/mcp-runtime

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcp-runtime-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: find dist -type f | sort

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: MCP Runtime ${{ github.ref_name }}
          body: |
            ## Try it

            Download the `mcp-runtime` CLI binary for your platform:

            - [macOS Apple Silicon](https://github.com/Agent-Hellboy/mcp-runtime/releases/download/${{ github.ref_name }}/mcp-runtime-darwin-arm64)
            - [macOS Intel](https://github.com/Agent-Hellboy/mcp-runtime/releases/download/${{ github.ref_name }}/mcp-runtime-darwin-amd64)
            - [Linux amd64](https://github.com/Agent-Hellboy/mcp-runtime/releases/download/${{ github.ref_name }}/mcp-runtime-linux-amd64)
            - [Linux arm64](https://github.com/Agent-Hellboy/mcp-runtime/releases/download/${{ github.ref_name }}/mcp-runtime-linux-arm64)
            - [Windows amd64](https://github.com/Agent-Hellboy/mcp-runtime/releases/download/${{ github.ref_name }}/mcp-runtime-windows-amd64.exe)

            Install and setup guide: https://mcpruntime.org/docs/getting-started/
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
