name: Security - Trivy

on:
  pull_request:
    branches: [ "*" ]
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  trivy-fs:
    name: Trivy FS Scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Trivy repository vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          format: sarif
          output: trivy-fs.sarif
          exit-code: "1"
          ignore-unfixed: true
          skip-dirs: inspirations/mcp-gateway-registry
          vuln-type: os,library
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true
          hide-progress: true

      - name: Upload Trivy repository SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@ed410739ba306e4ebe5e123421a6bd694e494a2b # v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs-vuln

      - name: Trivy repository misconfiguration scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig
          format: sarif
          output: trivy-misconfig.sarif
          exit-code: "0"
          skip-dirs: inspirations/mcp-gateway-registry
          trivyignores: .trivyignore.yaml
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true
          hide-progress: true

      - name: Upload Trivy misconfiguration SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@ed410739ba306e4ebe5e123421a6bd694e494a2b # v4
        with:
          sarif_file: trivy-misconfig.sarif
          category: trivy-fs-misconfig

  trivy-sentinel-images:
    name: Trivy ${{ matrix.image }} Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: operator
            dockerfile: Dockerfile.operator
            tag: mcp-runtime-operator:ci
          - image: platform-api
            dockerfile: services/platform-api/Dockerfile
            tag: mcp-platform-api:ci
          - image: analytics-api
            dockerfile: services/analytics-api/Dockerfile
            tag: mcp-analytics-api:ci
          - image: runtime-api
            dockerfile: services/runtime-api/Dockerfile
            tag: mcp-runtime-api:ci
          - image: ui
            dockerfile: services/ui/Dockerfile
            tag: mcp-sentinel-ui:ci
          - image: ingest
            dockerfile: services/ingest/Dockerfile
            tag: mcp-sentinel-ingest:ci
          - image: processor
            dockerfile: services/processor/Dockerfile
            tag: mcp-sentinel-processor:ci
          - image: mcp-gateway
            dockerfile: services/mcp-gateway/Dockerfile
            tag: mcp-sentinel-mcp-gateway:ci
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build image
        run: docker build --pull -f "${{ matrix.dockerfile }}" -t "${{ matrix.tag }}" .

      - name: Generate operator image SBOM
        if: matrix.image == 'operator'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ matrix.tag }}
          format: spdx-json
          output: operator-image.spdx.json
          exit-code: "0"
          hide-progress: true

      - name: Upload operator image SBOM
        if: matrix.image == 'operator'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: operator-image-sbom
          path: operator-image.spdx.json
          if-no-files-found: error

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ matrix.tag }}
          format: sarif
          output: trivy-image.sarif
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true
          hide-progress: true

      - name: Upload Trivy image SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@ed410739ba306e4ebe5e123421a6bd694e494a2b # v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-${{ matrix.image }}-image
