apiVersion: v1
kind: PersistentVolume
metadata:
  name: clickhouse-pv
  labels:
    app: clickhouse
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  storageClassName: local-path
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    namespace: mcp-sentinel
    name: data-clickhouse-0
  local:
    path: /var/lib/mcp-runtime/clickhouse
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: mcp-runtime.org/local-storage
              operator: In
              values:
                - "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-prometheus-config
  namespace: mcp-sentinel
data:
  prometheus.xml: |
    <clickhouse>
      <prometheus>
        <endpoint>/metrics</endpoint>
        <port>9363</port>
        <metrics>true</metrics>
        <events>true</events>
        <asynchronous_metrics>true</asynchronous_metrics>
      </prometheus>
    </clickhouse>
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: mcp-sentinel
spec:
  selector:
    app: clickhouse
  ports:
    - name: native
      port: 9000
      targetPort: 9000
    - name: http
      port: 8123
      targetPort: 8123
    - name: metrics
      port: 9363
      targetPort: 9363
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: mcp-sentinel
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-perms
          image: alpine:3.23
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "chown -R 101:101 /var/lib/clickhouse"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:23.8
          securityContext:
            runAsUser: 101
            runAsGroup: 101
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 9000
            - containerPort: 8123
            - containerPort: 9363
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            - name: CLICKHOUSE_DB
              valueFrom:
                configMapKeyRef:
                  name: mcp-sentinel-config
                  key: CLICKHOUSE_DB
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: prometheus-config
              mountPath: /etc/clickhouse-server/config.d/prometheus.xml
              subPath: prometheus.xml
      volumes:
        - name: prometheus-config
          configMap:
            name: clickhouse-prometheus-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: local-path
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
