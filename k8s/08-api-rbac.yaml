apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-sentinel-api
rules:
  # Read access to MCP custom resources
  - apiGroups: ["mcpruntime.org"]
    resources: ["mcpaccessgrants", "mcpagentsessions"]
    verbs: ["get", "list", "watch"]
  # Create/update/delete via /api/runtime/grants|sessions.
  - apiGroups: ["mcpruntime.org"]
    resources: ["mcpaccessgrants", "mcpagentsessions"]
    verbs: ["create", "update", "delete"]
  # Safe mutations (enable/disable/revoke/unrevoke)
  - apiGroups: ["mcpruntime.org"]
    resources: ["mcpaccessgrants"]
    verbs: ["patch"]
  - apiGroups: ["mcpruntime.org"]
    resources: ["mcpagentsessions"]
    verbs: ["patch"]
  # Restart deployments (for safe ops)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "patch"]
  # User deployment API creates Services in owned namespaces
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  # User/team namespace provisioning guardrails
  - apiGroups: [""]
    resources: ["namespaces", "resourcequotas", "limitranges", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Team namespaces created through the platform API must be routable through
  # the repo-managed Traefik ingress controller.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # User-scoped deployment requests use Kubernetes impersonation so namespace
  # RBAC is enforced as the platform user instead of the API service account.
  - apiGroups: [""]
    resources: ["users", "groups"]
    verbs: ["impersonate"]
  # List pods for health checks and logs
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Read pod logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Read configmaps for policy lookup
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  # MCPServer lifecycle via /api/runtime/servers and scoped runtime flows
  - apiGroups: ["mcpruntime.org"]
    resources: ["mcpservers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-sentinel-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-sentinel-api
subjects:
  - kind: ServiceAccount
    name: mcp-sentinel-api
    namespace: mcp-sentinel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcp-sentinel-api-user-key-secret
  namespace: mcp-sentinel
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["mcp-sentinel-user-api-keys"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-sentinel-api-user-key-secret
  namespace: mcp-sentinel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mcp-sentinel-api-user-key-secret
subjects:
  - kind: ServiceAccount
    name: mcp-sentinel-api
    namespace: mcp-sentinel
