apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-sentinel-api
  namespace: mcp-sentinel
automountServiceAccountToken: true
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-sentinel-api
  namespace: mcp-sentinel
spec:
  selector:
    app: mcp-sentinel-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-sentinel-api
  namespace: mcp-sentinel
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mcp-sentinel-api
  template:
    metadata:
      labels:
        app: mcp-sentinel-api
    spec:
      serviceAccountName: mcp-sentinel-api
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: mcp-sentinel-api:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: mcp-sentinel-config
          env:
            - name: PORT
              value: "8080"
            - name: METRICS_PORT
              value: "9090"
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: API_KEYS
            - name: ADMIN_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: ADMIN_API_KEYS
                  optional: true
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: POSTGRES_DSN
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: JWT_SECRET
                  optional: true
            - name: INTERNAL_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: INTERNAL_AUTH_TOKEN
                  optional: true
            - name: ADMIN_USERS
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: ADMIN_USERS
                  optional: true
            - name: PLATFORM_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: PLATFORM_ADMIN_EMAIL
                  optional: true
            - name: PLATFORM_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: PLATFORM_ADMIN_PASSWORD
                  optional: true
            - name: PLATFORM_DEV_LOGIN_ENABLED
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: PLATFORM_DEV_LOGIN_ENABLED
                  optional: true
            - name: PLATFORM_DEV_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: PLATFORM_DEV_USER_EMAIL
                  optional: true
            - name: PLATFORM_DEV_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: PLATFORM_DEV_USER_PASSWORD
                  optional: true
            - name: PLATFORM_DEV_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: PLATFORM_DEV_ADMIN_EMAIL
                  optional: true
            - name: PLATFORM_DEV_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: PLATFORM_DEV_ADMIN_PASSWORD
                  optional: true
            - name: OTEL_SERVICE_NAME
              value: mcp-sentinel-api
            - name: MCP_REGISTRY_PUSH_TEMP_DIR
              value: /var/run/mcp-runtime/registry-push
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              cpu: 100m
              ephemeral-storage: 512Mi
              memory: 128Mi
            limits:
              cpu: 500m
              ephemeral-storage: 2Gi
              memory: 256Mi
          volumeMounts:
            - name: registry-push-tmp
              mountPath: /var/run/mcp-runtime/registry-push
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: registry-push-tmp
          emptyDir: {}
