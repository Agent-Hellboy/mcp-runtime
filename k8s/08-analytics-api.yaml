apiVersion: v1
kind: Service
metadata:
  name: mcp-analytics-api
  namespace: mcp-sentinel
spec:
  selector:
    app: mcp-analytics-api
  ports:
    - name: http
      port: 8085
      targetPort: 8085
    - name: metrics
      port: 9095
      targetPort: 9095
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-analytics-api
  namespace: mcp-sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-analytics-api
  template:
    metadata:
      labels:
        app: mcp-analytics-api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: analytics-api
          image: mcp-analytics-api:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8085
            - containerPort: 9095
          envFrom:
            - configMapRef:
                name: mcp-sentinel-config
          env:
            - name: PORT
              value: "8085"
            - name: METRICS_PORT
              value: "9095"
            - name: CLICKHOUSE_ADDR
              value: "clickhouse:9000"
            - name: CLICKHOUSE_DB
              value: "mcp"
            - name: PLATFORM_API_URL
              value: "http://mcp-platform-api.mcp-sentinel.svc.cluster.local:8080"
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: API_KEYS
            - name: ADMIN_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: ADMIN_API_KEYS
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: JWT_SECRET
            - name: INTERNAL_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: INTERNAL_AUTH_TOKEN
            - name: OTEL_SERVICE_NAME
              value: mcp-analytics-api
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 20
