apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-platform-api
  namespace: mcp-sentinel
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcp-platform-api-user-key-secret
  namespace: mcp-sentinel
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["mcp-sentinel-user-api-keys"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["mcp-sentinel-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-platform-api-user-key-secret
  namespace: mcp-sentinel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mcp-platform-api-user-key-secret
subjects:
  - kind: ServiceAccount
    name: mcp-platform-api
    namespace: mcp-sentinel
