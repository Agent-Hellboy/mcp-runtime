apiVersion: v1
kind: Service
metadata:
  name: mcp-runtime-api
  namespace: mcp-sentinel
spec:
  selector:
    app: mcp-runtime-api
  ports:
    - name: http
      port: 8084
      targetPort: 8084
    - name: metrics
      port: 9094
      targetPort: 9094
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-runtime-api
  namespace: mcp-sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-runtime-api
  template:
    metadata:
      labels:
        app: mcp-runtime-api
    spec:
      serviceAccountName: mcp-runtime-api
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: runtime-api
          image: mcp-runtime-api:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8084
            - containerPort: 9094
          envFrom:
            - configMapRef:
                name: mcp-sentinel-config
          env:
            - name: PORT
              value: "8084"
            - name: METRICS_PORT
              value: "9094"
            - name: CLICKHOUSE_ADDR
              value: "clickhouse:9000"
            - name: CLICKHOUSE_DB
              value: "mcp"
            - name: PLATFORM_API_URL
              value: "http://mcp-platform-api.mcp-sentinel.svc.cluster.local:8080"
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: API_KEYS
            - name: ADMIN_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: ADMIN_API_KEYS
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: JWT_SECRET
            - name: INTERNAL_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-sentinel-secrets
                  key: INTERNAL_AUTH_TOKEN
            - name: OTEL_SERVICE_NAME
              value: mcp-runtime-api
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 20
