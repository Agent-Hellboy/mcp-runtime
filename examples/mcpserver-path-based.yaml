apiVersion: mcpruntime.org/v1alpha1
kind: MCPServer
metadata:
  name: go-example-mcp
  namespace: mcp-servers
spec:
  description: Go MCP example server with smoke, text transformation, prompt, resource, and task examples.
  image: your-registry.local/go-mcp-server
  imageTag: latest
  port: 8088
  servicePort: 80
  publicPathPrefix: go-example-mcp
  ingressClass: traefik
  ingressAnnotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
  envVars:
    - name: MCP_PATH
      value: /go-example-mcp/mcp
  tools:
    - name: aaa-ping
      description: Return a simple pong response.
      requiredTrust: low
      sideEffect: read
    - name: echo
      description: Echo back the provided message.
      requiredTrust: low
      sideEffect: read
    - name: add
      description: Add two numbers.
      requiredTrust: low
      sideEffect: read
    - name: upper
      description: Uppercase the provided message.
      requiredTrust: medium
      sideEffect: read
    - name: lower
      description: Lowercase the provided message.
      requiredTrust: low
      sideEffect: read
    - name: slugify
      description: Convert the provided message into a URL slug.
      requiredTrust: low
      sideEffect: read
    - name: create_task
      description: Create a deterministic task summary for IDE and adapter smoke tests.
      requiredTrust: low
      sideEffect: write
  prompts:
    - name: hello
      description: Return a simple prompt message.
    - name: summarize
      description: Summarize a short text input.
    - name: task_brief
      description: Draft a concise task brief from a goal.
  mcpResources:
    - name: readme
      description: Sample resource served by the Go MCP example server.
    - name: task-guide
      description: Task workflow guidance for the Go MCP example server.
  tasks:
    - name: create_task
      description: Deterministic task creation workflow for adapter smoke tests.
