version: v1
servers:
    - name: data-utility-mcp
      description: data-utility-mcp MCP server
      image: data-utility-mcp
      imageTag: latest
      route: /data-utility-mcp/mcp
      publicPathPrefix: data-utility-mcp
      port: 8088
      scope: tenant
      policy:
        mode: allow-list
        defaultDecision: deny
      session:
        required: true
      gateway:
        enabled: true
      tools:
        - name: ping
          description: Return a simple pong response.
          requiredTrust: low
          sideEffect: read
          riskLevel: low
        - name: echo
          description: Echo the provided message.
          requiredTrust: low
          sideEffect: read
          riskLevel: low
        - name: reverse
          description: Reverse the provided text.
          requiredTrust: low
          sideEffect: read
          riskLevel: low
        - name: add
          description: Add two numeric values.
          requiredTrust: low
          sideEffect: read
          riskLevel: low
        - name: multiply
          description: Multiply two numeric values.
          requiredTrust: low
          sideEffect: read
          riskLevel: low
        - name: upper
          description: Uppercase the provided message.
          requiredTrust: medium
          sideEffect: read
          riskLevel: medium
        - name: lower
          description: Lowercase the provided message.
          requiredTrust: low
          sideEffect: read
          riskLevel: low
        - name: slugify
          description: Convert the provided message into a URL slug.
          requiredTrust: low
          sideEffect: read
          riskLevel: low
        - name: word_count
          description: Count words in the provided message.
          requiredTrust: low
          sideEffect: read
          riskLevel: low
        - name: extract_keywords
          description: Extract stable lowercase keywords from a short text sample.
          requiredTrust: low
          sideEffect: read
          riskLevel: low
        - name: summarize_numbers
          description: Summarize numbers found in text.
          requiredTrust: medium
          sideEffect: read
          riskLevel: medium
        - name: now
          description: Return the current UTC timestamp.
          requiredTrust: low
          sideEffect: read
          riskLevel: low
        - name: create_task
          description: Create a deterministic task summary.
          requiredTrust: low
          sideEffect: write
          riskLevel: medium
