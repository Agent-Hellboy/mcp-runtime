version: v1
servers:
  - name: text-analysis-mcp
    description: Text analysis MCP server with repeat, word-count, and keyword extraction tools.
    route: /text-analysis-mcp/mcp
    publicPathPrefix: text-analysis-mcp
    port: 8088
    namespace: mcp-servers
    envVars:
      - name: MCP_PATH
        value: /text-analysis-mcp/mcp
    tools:
      - name: repeat
        description: Repeat the provided message a number of times.
        requiredTrust: low
        sideEffect: read
        riskLevel: low
      - name: word_count
        description: Count the words in the provided message.
        requiredTrust: low
        sideEffect: read
        riskLevel: low
      - name: extract_keywords
        description: Extract stable lowercase keywords from a short text sample.
        requiredTrust: low
        sideEffect: read
        riskLevel: low
