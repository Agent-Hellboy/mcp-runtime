apiVersion: mcpruntime.org/v1alpha1
kind: MCPAccessGrant
metadata:
  name: governed-agent-demo-grant
  namespace: mcp-servers
spec:
  serverRef:
    name: governed-agent-demo-mcp
    namespace: mcp-servers
  subject:
    humanID: support-lead
    agentID: ticket-triage-agent
  maxTrust: high
  policyVersion: v1
  toolRules:
    - name: slugify
      decision: allow
      requiredTrust: low
    - name: upper
      decision: allow
      requiredTrust: medium
