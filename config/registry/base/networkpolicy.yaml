apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: registry-default-deny
  namespace: registry
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: registry-allow-ingress
  namespace: registry
spec:
  podSelector:
    matchLabels:
      app: registry
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-sentinel
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-runtime
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-servers
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-servers-org
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-servers-public
        - namespaceSelector:
            matchLabels:
              platform.mcpruntime.org/managed: "true"
      ports:
        - protocol: TCP
          port: 5000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: registry-allow-egress
  namespace: registry
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: registry
      ports:
        - protocol: TCP
          port: 5000
