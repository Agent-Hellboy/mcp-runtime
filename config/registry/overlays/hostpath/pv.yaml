apiVersion: v1
kind: PersistentVolume
metadata:
  name: registry-pv
  labels:
    app: registry
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  storageClassName: local-path
  persistentVolumeReclaimPolicy: Delete
  hostPath:
    path: /var/lib/mcp-runtime/registry
    type: DirectoryOrCreate
