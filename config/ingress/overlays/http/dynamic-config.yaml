apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-dynamic
  namespace: traefik
data:
  dynamic.yml: |
    http:
      middlewares:
        registry-admin-auth:
          forwardAuth:
            # Post api-service-split cutover: mcp-platform-api.mcp-sentinel.svc.cluster.local:8080
            address: http://mcp-platform-api.mcp-sentinel.svc.cluster.local:8080/api/v1/registry/authz
            trustForwardHeader: false
        sentinel-admin-auth:
          forwardAuth:
            address: http://mcp-sentinel-ui.mcp-sentinel.svc.cluster.local:8082/auth/admin-check
            trustForwardHeader: true
        pii-redactor:
          plugin:
            pii-redactor:
              maskReplacement: "[redacted]"
              hashIDs: true
              maxBodyBytes: 1048576
              bypassHeaders:
                - Authorization
                - X-Internal-Auth
                - X-Api-Key
        strip-ingest-prefix:
          stripPrefix:
            prefixes:
              - /ingest
