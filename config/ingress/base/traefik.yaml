apiVersion: v1
kind: Namespace
metadata:
  name: traefik
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
# Traefik CRDs (IngressRoute, IngressRouteTCP, Middleware, TLSOption,
# ServersTransport, ...) are vendored from the official v2.10 bundle in
# traefik-crds.yaml so the mtls terminate+re-encrypt path has the kinds the
# operator generates.
---
apiVersion: v1
kind: Namespace
metadata:
  name: registry
  labels:
    # hostpath overlays use a root chown initContainer; keep that exception
    # visible while enforcing the strongest compatible default.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: mcp-sentinel
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: mcp-servers
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: mcp-servers-org
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: mcp-servers-public
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik
  namespace: traefik
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik-ingressclass
rules:
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingressclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["traefik.io"]
    resources:
      ["ingressroutes", "ingressroutetcps", "middlewares", "tlsoptions", "serverstransports", "traefikservices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik-ingressclass
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-ingressclass
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: traefik
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: traefik-watch
  namespace: registry
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traefik-watch
  namespace: registry
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: traefik-watch
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: traefik
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: traefik-watch
  namespace: mcp-sentinel
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traefik-watch
  namespace: mcp-sentinel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: traefik-watch
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: traefik
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: traefik-watch
  namespace: mcp-servers
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traefik-watch
  namespace: mcp-servers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: traefik-watch
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: traefik
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: traefik-watch
  namespace: mcp-servers-org
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traefik-watch
  namespace: mcp-servers-org
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: traefik-watch
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: traefik
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: traefik-watch
  namespace: mcp-servers-public
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traefik-watch
  namespace: mcp-servers-public
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: traefik-watch
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: traefik
---
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: traefik
spec:
  type: LoadBalancer
  ports:
    - name: web
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: websecure
      port: 443
      targetPort: 8443
      protocol: TCP
  selector:
    app: traefik
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: traefik
spec:
  replicas: 2
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: traefik
        image: traefik:v2.10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          capabilities:
            drop:
              - ALL
        args:
          - --providers.kubernetesingress=true
          - --providers.kubernetesingress.namespaces=registry,mcp-sentinel,mcp-servers,mcp-servers-org,mcp-servers-public
          - --providers.kubernetescrd=true
          - --providers.kubernetescrd.namespaces=mcp-servers,mcp-servers-org,mcp-servers-public
          - --entrypoints.web.address=:8000
          - --entrypoints.web.forwardedHeaders.insecure=false
          - --entrypoints.web.http.redirections.entryPoint.to=websecure
          - --entrypoints.web.http.redirections.entryPoint.scheme=https
          - --entrypoints.websecure.address=:8443
          - --entrypoints.websecure.forwardedHeaders.insecure=false
          - --entrypoints.websecure.http.tls=true
          - --entrypoints.traefik.address=:8080
          - --ping=true
          - --ping.entryPoint=traefik
          - --providers.file.filename=/etc/traefik/dynamic/dynamic.yml
          - --providers.file.watch=true
          # Local middleware that injects the verified SPIFFE identity for mtls servers.
          - --experimental.localPlugins.spiffe-identity.moduleName=github.com/Agent-Hellboy/mcp-runtime/traefik-plugins/spiffe-identity
        ports:
          - name: web
            containerPort: 8000
          - name: websecure
            containerPort: 8443
          - name: admin
            containerPort: 8080
        volumeMounts:
          - name: traefik-dynamic
            mountPath: /etc/traefik/dynamic
            readOnly: true
          - name: spiffe-identity-plugin
            mountPath: /plugins-local/src/github.com/Agent-Hellboy/mcp-runtime/traefik-plugins/spiffe-identity
            readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /ping
            port: admin
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ping
            port: admin
          initialDelaySeconds: 15
          periodSeconds: 20
      volumes:
        - name: traefik-dynamic
          configMap:
            name: traefik-dynamic
            items:
              - key: dynamic.yml
                path: dynamic.yml
        - name: spiffe-identity-plugin
          configMap:
            name: traefik-plugin-spiffe-identity
            items:
              - key: go.mod
                path: go.mod
              - key: .traefik.yml
                path: .traefik.yml
              - key: spiffe_identity.go
                path: spiffe_identity.go
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: traefik
  namespace: traefik
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: traefik
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: traefik
spec:
  controller: traefik.io/ingress-controller
