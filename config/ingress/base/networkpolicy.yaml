apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: traefik-default-deny
  namespace: traefik
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: traefik-allow-ingress
  namespace: traefik
spec:
  podSelector:
    matchLabels:
      app: traefik
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: traefik-allow-egress
  namespace: traefik
spec:
  podSelector:
    matchLabels:
      app: traefik
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: registry
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-sentinel
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-servers
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-servers-org
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-servers-public
        - namespaceSelector:
            matchLabels:
              platform.mcpruntime.org/managed: "true"
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 5000
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
    # Traefik watches Ingress and TLS Secret objects through the Kubernetes API.
    - ports:
        - protocol: TCP
          port: 443
