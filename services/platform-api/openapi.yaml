openapi: 3.1.0
info:
  title: MCP Runtime Platform API
  version: 1.0.0
paths:
  /health:
    get:
      responses:
        "200":
          description: service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOK"
  /ready:
    get:
      responses:
        "200":
          description: dependencies ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOK"
        "503":
          description: dependency unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/v1/openapi.yaml:
    get:
      responses:
        "200":
          description: OpenAPI document
          content:
            application/yaml:
              schema:
                type: string
  /api/v1/auth/me:
    get:
      responses:
        "200":
          description: current principal
          content:
            application/json:
              schema:
                type: object
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/v1/auth/login:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: login success
          content:
            application/json:
              schema:
                type: object
        "401":
          description: invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/auth/resolve:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key:
                  type: string
      responses:
        "200":
          description: resolved principal
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/identity/principal:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
      responses:
        "200":
          description: principal
          content:
            application/json:
              schema:
                type: object
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/identity/resolve-ids:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_ids:
                  type: array
                  items:
                    type: string
                team_ids:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: resolved labels
          content:
            application/json:
              schema:
                type: object
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/audit:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, resource, status]
              properties:
                action:
                  type: string
                resource:
                  type: string
                status:
                  type: string
      responses:
        "202":
          description: accepted
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/identity/teams:
    get:
      responses:
        "200":
          description: team list
          content:
            application/json:
              schema:
                type: object
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, name]
              properties:
                slug:
                  type: string
                name:
                  type: string
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                type: object
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/identity/namespaces:
    get:
      responses:
        "200":
          description: namespace list
          content:
            application/json:
              schema:
                type: object
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/identity/users:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                type: object
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/operations/snapshot:
    get:
      responses:
        "200":
          description: operations snapshot
          content:
            application/json:
              schema:
                type: object
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  schemas:
    ErrorEnvelope:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
    HealthOK:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
