openapi: 3.1.0
info:
  title: MCP Runtime Control API
  version: 1.0.0
paths:
  /health:
    get:
      responses:
        "200":
          description: service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOK"
  /ready:
    get:
      responses:
        "200":
          description: dependencies ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOK"
        "503":
          description: dependency unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/v1/openapi.yaml:
    get:
      responses:
        "200":
          description: OpenAPI document
          content:
            application/yaml:
              schema:
                type: string
  /api/v1/runtime/servers:
    get:
      responses:
        "200":
          description: server inventory
          content:
            application/json:
              schema:
                type: object
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /api/v1/runtime/tools:
    get:
      responses:
        "200":
          description: tool inventory
          content:
            application/json:
              schema:
                type: object
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /internal/auth/resolve:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key:
                  type: string
      responses:
        "200":
          description: resolved principal
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "401":
          description: unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  schemas:
    ErrorEnvelope:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
    HealthOK:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
